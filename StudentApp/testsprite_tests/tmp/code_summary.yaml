version: "2"
type: frontend
tech_stack:
  - JavaScript
  - React Native (Expo)
  - React Native core components
  - Fetch API
routes:
  - path: /login
    file: App.js
    auth_required: false
    description: Login screen shown when the session is not authenticated.
  - path: /students
    file: App.js
    auth_required: true
    description: Student list dashboard with search, sorting, and CRUD modals.
features:
  - name: Authentication Session
    description: Users sign in, restore session state, and can log out.
    files:
      - App.js
      - components/LoginPage.js
      - services/studentApi.js
    entry_route: /login
    user_interactions:
      - Enter username in the username field.
      - Enter password in the password field.
      - Toggle show/hide password control.
      - Tap Sign In to authenticate.
      - Tap Log Out from the dashboard.
    api_calls:
      - method: POST
        endpoint: /login.php
      - method: POST
        endpoint: /logout.php
      - method: GET
        endpoint: /me.php
    auth_required: false
  - name: Student List Viewing
    description: Display students, refresh the list, and handle loading/error states.
    files:
      - App.js
      - components/StudentCard.js
      - services/studentApi.js
    entry_route: /students
    user_interactions:
      - View skeleton loading cards while data loads.
      - Pull to refresh or tap refresh action.
      - Retry list loading after a fetch error.
      - Scroll and inspect student cards.
    api_calls:
      - method: GET
        endpoint: /students.php
    auth_required: true
  - name: Student Search and Sorting
    description: Filter and order the student list by name or rating.
    files:
      - App.js
    entry_route: /students
    user_interactions:
      - Type text into search input.
      - Tap sort button to cycle through sort modes.
      - Verify list updates in real time.
    api_calls: []
    auth_required: true
  - name: Student Create and Edit
    description: Add and edit students through modal forms with unsaved-change protection.
    files:
      - App.js
      - components/StudentForm.js
      - components/StudentModal.js
      - services/studentApi.js
    entry_route: /students
    user_interactions:
      - Tap Add Student to open the create modal.
      - Fill first name, last name, and rating fields.
      - Submit the form to create a student.
      - Open edit on an existing student and modify values.
      - Attempt to close dirty form and confirm discard dialog.
    api_calls:
      - method: POST
        endpoint: /create_student.php
      - method: POST
        endpoint: /update_student.php
    auth_required: true
  - name: Student Deletion
    description: Delete student records with confirmation and optimistic UI rollback on failure.
    files:
      - App.js
      - components/StudentCard.js
      - services/studentApi.js
    entry_route: /students
    user_interactions:
      - Tap delete action on a student card.
      - Confirm or cancel the delete confirmation dialog.
      - Observe success and rollback behavior on errors.
    api_calls:
      - method: POST
        endpoint: /delete_student.php
    auth_required: true
known_limitations:
  - issue: App state controls screens without a dedicated router, so route-level deep-link coverage is limited.
    location: App.js
    impact: Automated navigation tests should model state transitions instead of URL route changes.
  - issue: Login credentials are expected from backend config and may disable login-specific generated tests when unavailable.
    location: utils/config.js
    impact: Frontend test generation may skip authenticated scenarios unless credentials are configured.
